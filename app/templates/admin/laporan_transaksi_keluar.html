<!DOCTYPE html>
<html>
<head>
    <title>Laporan Transaksi Keluar</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Laporan Transaksi Keluar</h1>
    <table>
        <thead>
            <tr>
                <th>Nama Barang</th>
                <th>Jumlah</th>
                <th>Tanggal</th>
            </tr>
        </thead>
        <tbody>
            {% for item in transaksi_keluar %}
            <tr>
                <td>{{ item.nama_barang }}</td>
                <td>{{ item.jumlah }}</td>
                <td>{{ item.tanggal }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
