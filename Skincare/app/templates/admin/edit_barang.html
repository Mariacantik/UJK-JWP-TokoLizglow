{% extends 'base.html' %}

{% block title %}Edit Barang{% endblock %}

{% block content %}
<h1>Edit Barang</h1>
<form method="POST">
    <div>
        <label for="nama">Nama Barang</label>
        <input type="text" name="nama" id="nama" value="{{ barang.nama }}" required>
    </div>
    <div>
        <label for="stok">Stok</label>
        <input type="number" name="stok" id="stok" value="{{ barang.stok }}" required>
    </div>
    <div>
        <label for="kategori_id">Kategori</label>
        <select name="kategori_id" id="kategori_id" required>
            {% for k in kategori %}
            <option value="{{ k.id }}" {% if k.id == barang.kategori_id %}selected{% endif %}>{{ k.nama }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit">Simpan</button>
</form>
<a href="{{ url_for('main.admin_dashboard') }}">Kembali</a>
{% endblock %}
