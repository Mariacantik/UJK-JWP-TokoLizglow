<!DOCTYPE html>
<html lang="id">
<head>
    <title>Manage Pelanggan - Lizglow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-green-600 p-4 text-white flex justify-between">
        <div class="font-bold">Lizglow Inventory</div>
        <div>
            <a href="/admin/dashboard" class="mr-4">Dashboard</a>
            <a href="/admin/manage_barang" class="mr-4">Manage Barang</a>
            <a href="/admin/manage_pelanggan" class="font-bold underline">Manage Pelanggan</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold text-green-700 mb-6">Manage Pelanggan</h1>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4">Tambah Pelanggan Baru</h2>
            <form action="/admin/tambah_pelanggan" method="POST">
                <div class="mb-4">
                    <label>Nama Pelanggan:</label>
                    <input type="text" name="nama_pelanggan" required class="w-full border p-2 rounded">
                </div>
                <div class="mb-4">
                    <label>No. HP:</label>
                    <input type="text" name="no_hp" required class="w-full border p-2 rounded">
                </div>
                <div class="mb-4">
                    <label>Alamat:</label>
                    <textarea name="alamat" required class="w-full border p-2 rounded"></textarea>
                </div>
                <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Simpan Pelanggan</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4">Daftar Pelanggan</h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-green-600 text-white">
                        <th class="p-3">Nama Pelanggan</th>
                        <th class="p-3">No. HP</th>
                        <th class="p-3">Alamat</th>
                        <th class="p-3">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in pelanggan %}
                    <tr class="border-b">
                        <td class="p-3">{{ item.nama_pelanggan }}</td>
                        <td class="p-3">{{ item.no_hp }}</td>
                        <td class="p-3">{{ item.alamat }}</td>
                        <td class="p-3">
                            <a href="/admin/hapus_pelanggan/{{ item.id_pelanggan }}" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600" onclick="return confirm('Yakin ingin menghapus pelanggan ini?')">Hapus</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
